services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: internetlab-app
    restart: always
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
    networks:
      - app-network

  webserver:
    image: nginx:alpine
    container_name: internetlab-webserver
    restart: always
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    depends_on:
      - app
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: internetlab-db
    restart: always
    environment:
      MYSQL_DATABASE: internetlab_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: internetlab-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data: